homepage: https://github.com/Chip-Hosting-Solutions/marver-gtm-templates
documentation: https://github.com/Chip-Hosting-Solutions/marver-gtm-templates#readme
description: |
  Send page views, custom events, and identify calls to a Marver / Data
  Workbench Sensor. Auto-tracks SPA navigation, click, and form events.
  Events flow only to the Sensor URL you configure — Marver does not
  collect any third-party data.
categories:
  - ANALYTICS
versions:
  - sha: 162d551
    changeNotes: |
      Initial Gallery release. The bundled GTM tag template:
      - Injects the Marver SDK from cdn.chip-hosting.com/marver/v1/
      - Single tag with three modes: Configure Marver, Send Event,
        Identify User.
      - Auto-tracks page views (incl. SPA route changes via the SDK's
        Navigation API + history.pushState patches), clicks, and form
        submits.
      - Honors GTM Consent Mode v2 (waits for analytics_storage).
      - access_globals permissions enumerate every nested SDK method
        path the tag invokes (dwb.init, dwb.isInitialized, dwb.track,
        dwb.identify) — required because GTM's permission model does
        not match prefixes.
      - No try/catch (unsupported in GTM sandboxed JS); init failure
        is detected via post-call isInitialized() probe.
      - Always-on diagnostic logs ([dwb] ...) surface init issues.
